version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    main: .
    binary: lazytailscale
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: "^.*feat[(:]"
      order: 0
    - title: Bug fixes
      regexp: "^.*fix[(:]"
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^assets:"
      - "Co-Authored-By"

brews:
  - repository:
      owner: mogglemoss
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/mogglemoss/lazytailscale"
    description: "A terminal dashboard for your Tailscale network"
    license: "MIT"
    install: |
      bin.install "lazytailscale"
    test: |
      assert_match version.to_s, shell_output("#{bin}/lazytailscale --version")
